<!-- ОБЪЯВЛЕНИЕ ТИПА ДОКУМЕНТА -->
<!DOCTYPE html>

<html lang="ru">

<!-- Информация, не видна на странице -->
<head> 
    <!-- КОДИРОВКА -->
    <meta charset="UTF-8"> 
    
    <!-- НАЗВАНИЕ СТРАНИЦЫ -->
    <title>my website</title> 
    
    <!-- Берем стили из файла style.css -->
    <link rel="stylesheet" href="style.css"> 
</head> 

<!-- Всё, что видит пользователь, пишется здесь -->
<body> 
    <!-- Навигация -->
    <div class="navigation">
        <!-- ПАНЕЛЬ -->
        <div class="panel">
            <!-- ЛОГОТИП -->
            <div class="logo">
                <img src="images/logo.png" alt="Логотип"> 
                <!-- <img> — тег для вставки изображения
                src = "logo.png" — указывает путь к файлу изображения (логотип должен лежать в той же папке, что и HTML-файл)
                alt = "Логотип" — альтернативный текст, который покажется, если изображение не загрузится -->
            </div>
            
            <!-- ← ИСПРАВЛЕНО: добавил контейнер .menu для правильного центрирования кнопок -->
            <div class="menu">
                <!-- КНОПКИ -->
                <a href="#">Главная</a>
                <a href="#">О нас</a>
                <a href="#">Контакты</a>
            </div>
            
            <!-- КНОПКА ПРОФИЛЯ -->
            <a href="#" class="profile"><img src="images/avatar.jpg" alt="Профиль"></a>
            
        </div> 
    </div>

    <div class="greeting">
        <h1>Добро пожаловать!</h1>
        <p>мемемемемемебебебебебе</p>
    </div>

</body>
</html>
